<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI配色助手 - MVP</title>
    <style>
        :root {
            --bg-primary: #FFFFFF;
            --bg-secondary: #F8F9FA;
            --text-primary: #1A1A2E;
            --text-secondary: #6B7280;
            --border-color: #E5E7EB;
            --accent-ai: #7C3AED;
            --success: #10B981;
            --warning: #F59E0B;
            --error: #EF4444;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --transition-normal: 0.25s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .navbar {
            height: 56px;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 var(--spacing-lg);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            font-size: 18px;
            font-weight: 700;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .nav-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.15s;
        }

        .nav-btn:hover {
            background: #F3F4F6;
        }

        .main-content {
            display: flex;
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--spacing-lg);
            gap: var(--spacing-lg);
        }

        .left-panel {
            width: 320px;
            flex-shrink: 0;
        }

        .center-panel {
            flex: 1;
            min-width: 0;
        }

        .right-panel {
            width: 280px;
            flex-shrink: 0;
        }

        .panel-section {
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            margin-bottom: var(--spacing-md);
        }

        .panel-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: var(--spacing-md);
        }

        .color-wheel-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #colorWheel {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            border: 2px solid var(--border-color);
        }

        .color-preview {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            margin-top: var(--spacing-md);
        }

        .preview-box {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-sm);
        }

        .hex-value {
            font-family: monospace;
            font-size: 14px;
        }

        .select-field {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            background: var(--bg-primary);
            cursor: pointer;
            margin-bottom: var(--spacing-md);
        }

        .btn-primary {
            width: 100%;
            padding: 10px;
            background: var(--accent-ai);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 14px;
            transition: background 0.15s;
        }

        .btn-primary:hover {
            background: #6D28D9;
        }

        .color-palette {
            display: flex;
            gap: var(--spacing-sm);
            flex-wrap: wrap;
            justify-content: center;
        }

        .color-swatch {
            width: 120px;
            height: 100px;
            border-radius: var(--radius-md);
            position: relative;
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 8px;
        }

        .color-swatch:hover {
            transform: scale(1.05);
        }

        .color-swatch .copy-icon {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 24px;
            height: 24px;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .color-swatch:hover .copy-icon {
            opacity: 1;
        }

        .color-label {
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-family: monospace;
        }

        .preview-section {
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
        }

        .preview-tabs {
            display: flex;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-md);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: var(--spacing-sm);
        }

        .preview-tab {
            padding: 4px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 12px;
            transition: background 0.15s;
        }

        .preview-tab.active {
            background: var(--accent-ai);
            color: white;
        }

        .preview-content {
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slider-control {
            margin-bottom: var(--spacing-md);
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: var(--border-color);
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent-ai);
            cursor: pointer;
        }

        .export-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .export-btn {
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            background: var(--bg-primary);
            cursor: pointer;
            font-size: 12px;
            transition: all 0.15s;
        }

        .export-btn:hover {
            background: var(--accent-ai);
            color: white;
            border-color: var(--accent-ai);
        }

        .history-list {
            max-height: 150px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            gap: 4px;
            padding: 8px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            margin-bottom: 4px;
            transition: background 0.15s;
        }

        .history-item:hover {
            background: var(--bg-primary);
        }

        .history-dot {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text-primary);
            color: var(--bg-primary);
            padding: var(--spacing-md) var(--spacing-lg);
            border-radius: var(--radius-md);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
        }

        .toast.success {
            background: var(--success);
            color: white;
        }

        .empty-state {
            color: var(--text-secondary);
            font-size: 13px;
            text-align: center;
            padding: var(--spacing-lg);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <span>🎨</span>
            <span>AI配色助手</span>
        </div>
        <div class="nav-buttons">
            <button class="nav-btn" onclick="showHelp()">?</button>
            <button class="nav-btn" onclick="showAbout()">ℹ️</button>
        </div>
    </nav>

    <main class="main-content">
        <aside class="left-panel">
            <div class="panel-section">
                <h3 class="panel-title">色轮选择器</h3>
                <div class="color-wheel-container">
                    <canvas id="colorWheel" width="260" height="260"></canvas>
                    <div class="color-preview">
                        <div class="preview-box" id="selectedColorPreview"></div>
                        <span class="hex-value" id="selectedHex">#FF6B6B</span>
                    </div>
                </div>
            </div>

            <div class="panel-section">
                <h3 class="panel-title">和谐规则</h3>
                <select class="select-field" id="harmonyRule">
                    <option value="complementary">互补色</option>
                    <option value="analogous">邻近色</option>
                    <option value="triadic">三角色</option>
                    <option value="monochromatic">单色渐变</option>
                </select>
                <button class="btn-primary" onclick="generateColors()">生成配色</button>
            </div>
        </aside>

        <section class="center-panel">
            <div class="color-palette" id="colorPalette">
            </div>

            <div class="preview-section">
                <div class="preview-tabs">
                    <span class="preview-tab active" onclick="switchPreview('card')">卡片</span>
                    <span class="preview-tab" onclick="switchPreview('banner')">Banner</span>
                    <span class="preview-tab" onclick="switchPreview('web')">网页</span>
                </div>
                <div class="preview-content" id="previewContent">
                </div>
            </div>
        </section>

        <aside class="right-panel">
            <div class="panel-section">
                <h3 class="panel-title">HSV微调</h3>
                <div class="slider-control">
                    <div class="slider-label">
                        <span>色相</span>
                        <span id="hueValue">0°</span>
                    </div>
                    <input type="range" id="hueSlider" min="0" max="360" value="0">
                </div>
                <div class="slider-control">
                    <div class="slider-label">
                        <span>饱和度</span>
                        <span id="satValue">100%</span>
                    </div>
                    <input type="range" id="satSlider" min="0" max="100" value="100">
                </div>
                <div class="slider-control">
                    <div class="slider-label">
                        <span>明度</span>
                        <span id="valValue">50%</span>
                    </div>
                    <input type="range" id="valSlider" min="0" max="100" value="50">
                </div>
            </div>

            <div class="panel-section">
                <h3 class="panel-title">导出</h3>
                <div class="export-buttons">
                    <button class="export-btn" onclick="exportPalette('css')">CSS</button>
                    <button class="export-btn" onclick="exportPalette('json')">JSON</button>
                    <button class="export-btn" onclick="exportPalette('png')">PNG</button>
                </div>
            </div>

            <div class="panel-section">
                <h3 class="panel-title">历史记录</h3>
                <div class="history-list" id="historyList">
                    <div class="empty-state">暂无历史记录</div>
                </div>
            </div>
        </aside>
    </main>

    <div class="toast" id="toast"></div>

    <script>
        const state = {
            currentColors: ['#FF6B6B', '#4ECDC4', '#FFE66D', '#1A535C', '#FF9F1C'],
            selectedColor: '#FF6B6B',
            hue: 0,
            sat: 100,
            val: 50,
            harmonyRule: 'complementary',
            activePreview: 'card',
            history: []
        };

        function init() {
            renderColorPalette();
            updatePreview();
            initColorWheel();
            bindEvents();
        }

        function bindEvents() {
            document.getElementById('harmonyRule').addEventListener('change', (e) => {
                state.harmonyRule = e.target.value;
            });

            ['hueSlider', 'satSlider', 'valSlider'].forEach(id => {
                document.getElementById(id).addEventListener('input', (e) => {
                    updateHSV(id, e.target.value);
                });
            });
        }

        function initColorWheel() {
            const canvas = document.getElementById('colorWheel');
            const ctx = canvas.getContext('2d');
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = 110;

            for (let angle = 0; angle < 360; angle++) {
                const startAngle = (angle - 1) * Math.PI / 180;
                const endAngle = (angle + 1) * Math.PI / 180;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = `hsl(${angle}, 100%, 50%)`;
                ctx.fill();
            }

            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, radius);
            gradient.addColorStop(0, 'white');
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.fill();

            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            ctx.strokeStyle = '#E5E7EB';
            ctx.lineWidth = 2;
            ctx.stroke();

            let isDragging = false;

            canvas.addEventListener('mousedown', (e) => {
                isDragging = true;
                updateIndicator(e);
            });

            canvas.addEventListener('mousemove', (e) => {
                if (isDragging) updateIndicator(e);
            });

            canvas.addEventListener('mouseup', () => isDragging = false);
            canvas.addEventListener('mouseleave', () => isDragging = false);

            function updateIndicator(e) {
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left - centerX;
                const y = e.clientY - rect.top - centerY;
                const distance = Math.sqrt(x * x + y * y);

                if (distance <= radius) {
                    const angle = Math.atan2(y, x);
                    const hue = (angle * 180 / Math.PI + 360) % 360;
                    state.hue = Math.round(hue);
                    state.selectedColor = hslToHex(hue, 100, 50);

                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    initColorWheel();

                    const indicatorX = centerX + radius * Math.cos(angle);
                    const indicatorY = centerY + radius * Math.sin(angle);

                    ctx.beginPath();
                    ctx.arc(indicatorX, indicatorY, 8, 0, 2 * Math.PI);
                    ctx.fillStyle = 'white';
                    ctx.fill();
                    ctx.strokeStyle = '#374151';
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    document.getElementById('selectedColorPreview').style.background = state.selectedColor;
                    document.getElementById('selectedHex').textContent = state.selectedColor;
                    document.getElementById('hueSlider').value = state.hue;
                    document.getElementById('hueValue').textContent = state.hue + '°';
                }
            }
        }

        function hslToHex(h, s, l) {
            s /= 100;
            l /= 100;
            const a = s * Math.min(l, 1 - l);
            const f = n => {
                const k = (n + h / 30) % 12;
                const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
                return Math.round(255 * color).toString(16).padStart(2, '0');
            };
            return `#${f(0)}${f(8)}${f(4)}`.toUpperCase();
        }

        function generateColors() {
            const colors = [];
            const h = state.hue;

            switch(state.harmonyRule) {
                case 'complementary':
                    colors.push(hslToHex(h, 70, 60));
                    colors.push(hslToHex(h, 60, 45));
                    colors.push(hslToHex((h + 180) % 360, 70, 60));
                    colors.push(hslToHex((h + 180) % 360, 60, 45));
                    colors.push(hslToHex((h + 180) % 360, 50, 75));
                    break;
                case 'analogous':
                    colors.push(hslToHex(h, 70, 60));
                    colors.push(hslToHex((h + 30) % 360, 65, 55));
                    colors.push(hslToHex((h + 60) % 360, 60, 50));
                    colors.push(hslToHex((h - 30 + 360) % 360, 65, 55));
                    colors.push(hslToHex((h - 60 + 360) % 360, 60, 50));
                    break;
                case 'triadic':
                    colors.push(hslToHex(h, 70, 60));
                    colors.push(hslToHex(h, 50, 45));
                    colors.push(hslToHex((h + 120) % 360, 70, 60));
                    colors.push(hslToHex((h + 120) % 360, 50, 45));
                    colors.push(hslToHex((h + 240) % 360, 70, 60));
                    break;
                case 'monochromatic':
                    colors.push(hslToHex(h, 60, 80));
                    colors.push(hslToHex(h, 60, 65));
                    colors.push(hslToHex(h, 70, 50));
                    colors.push(hslToHex(h, 80, 35));
                    colors.push(hslToHex(h, 90, 20));
                    break;
            }

            state.currentColors = colors;
            renderColorPalette();
            updatePreview();
            addToHistory();
            showToast('配色已生成！', 'success');
        }

        function renderColorPalette() {
            const container = document.getElementById('colorPalette');
            container.innerHTML = state.currentColors.map((color, i) => `
                <div class="color-swatch" style="background: ${color};" onclick="copyColor(${i})">
                    <span class="copy-icon">📋</span>
                    <span class="color-label">${color}</span>
                </div>
            `).join('');
        }

        function copyColor(index) {
            const color = state.currentColors[index];
            navigator.clipboard.writeText(color).then(() => {
                showToast(`已复制: ${color}`, 'success');
            });
        }

        function updateHSV(sliderId, value) {
            switch(sliderId) {
                case 'hueSlider':
                    state.hue = parseInt(value);
                    document.getElementById('hueValue').textContent = value + '°';
                    break;
                case 'satSlider':
                    state.sat = parseInt(value);
                    document.getElementById('satValue').textContent = value + '%';
                    break;
                case 'valSlider':
                    state.val = parseInt(value);
                    document.getElementById('valValue').textContent = value + '%';
                    break;
            }
            state.selectedColor = hslToHex(state.hue, state.sat, state.val);
            document.getElementById('selectedColorPreview').style.background = state.selectedColor;
            document.getElementById('selectedHex').textContent = state.selectedColor;
        }

        function switchPreview(type) {
            state.activePreview = type;
            document.querySelectorAll('.preview-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`[onclick="switchPreview('${type}')"]`).classList.add('active');
            updatePreview();
        }

        function updatePreview() {
            const container = document.getElementById('previewContent');
            const colors = state.currentColors;

            const templates = {
                card: `
                    <div style="display: flex; gap: 12px;">
                        ${colors.slice(0, 3).map((c, i) => `
                            <div style="width: 100px; background: ${c}; border-radius: 8px; padding: 16px; text-align: center;">
                                <div style="font-size: 20px; margin-bottom: 8px;">📦</div>
                                <div style="font-size: 12px; color: ${getContrast(c)};">卡片 ${i + 1}</div>
                            </div>
                        `).join('')}
                    </div>
                `,
                banner: `
                    <div style="width: 100%; height: 120px; background: linear-gradient(135deg, ${colors[0]}, ${colors[1]}); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white;">
                        <div style="text-align: center;">
                            <div style="font-size: 24px; margin-bottom: 8px;">🎨</div>
                            <div style="font-size: 16px; font-weight: 600;">Banner 预览</div>
                        </div>
                    </div>
                `,
                web: `
                    <div style="width: 100%; background: white; border-radius: 8px; padding: 16px; border: 1px solid #E5E7EB;">
                        <div style="display: flex; gap: 6px; margin-bottom: 12px;">
                            ${colors.map(c => `<div style="width: 24px; height: 24px; background: ${c}; border-radius: 4px;"></div>`).join('')}
                        </div>
                        <div style="font-size: 14px; font-weight: 600; margin-bottom: 4px;">网页标题</div>
                        <div style="font-size: 12px; color: #6B7280;">这是网页内容预览区域</div>
                        <button style="margin-top: 12px; padding: 6px 12px; background: ${colors[0]}; color: ${getContrast(colors[0])}; border: none; border-radius: 4px; font-size: 12px;">按钮</button>
                    </div>
                `
            };

            container.innerHTML = templates[state.activePreview] || templates.card;
        }

        function getContrast(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
            return luminance > 0.5 ? '#1A1A2E' : '#FFFFFF';
        }

        function addToHistory() {
            const exists = state.history.some(h => h.every((c, i) => c === state.currentColors[i]));
            if (!exists) {
                state.history.unshift([...state.currentColors]);
                if (state.history.length > 10) state.history.pop();
                renderHistory();
            }
        }

        function renderHistory() {
            const container = document.getElementById('historyList');
            if (state.history.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无历史记录</div>';
                return;
            }

            container.innerHTML = state.history.map((colors, i) => `
                <div class="history-item" onclick="loadHistory(${i})">
                    ${colors.map(c => `<div class="history-dot" style="background: ${c};"></div>`).join('')}
                </div>
            `).join('');
        }

        function loadHistory(index) {
            state.currentColors = [...state.history[index]];
            renderColorPalette();
            updatePreview();
            showToast('已加载历史配色', 'success');
        }

        function exportPalette(format) {
            let content = '';
            let filename = '';

            switch(format) {
                case 'css':
                    content = `:root {\n${state.currentColors.map((c, i) => `  --color-${i + 1}: ${c};`).join('\n')}\n}`;
                    filename = 'palette.css';
                    break;
                case 'json':
                    content = JSON.stringify({ colors: state.currentColors }, null, 2);
                    filename = 'palette.json';
                    break;
                case 'png':
                    const canvas = document.createElement('canvas');
                    canvas.width = 500;
                    canvas.height = 100;
                    const ctx = canvas.getContext('2d');
                    const w = canvas.width / state.currentColors.length;
                    state.currentColors.forEach((c, i) => {
                        ctx.fillStyle = c;
                        ctx.fillRect(i * w, 0, w, canvas.height);
                    });
                    const link = document.createElement('a');
                    link.href = canvas.toDataURL('image/png');
                    link.download = 'palette.png';
                    link.click();
                    showToast('已导出为 PNG', 'success');
                    return;
            }

            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
            showToast(`已导出为 ${format.toUpperCase()}`, 'success');
        }

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function showHelp() {
